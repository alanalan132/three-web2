<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>员工全月排班系统（含考勤汇总）</title>
<style>
*{box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;margin:0;padding:0}
html,body{width:100%;overflow-x:hidden;background:#f7f8fa;padding:8px;}
.container{max-width:1000px;margin:0 auto;}
.title{text-align:center;font-size:20px;margin:10px 0 15px;color:#222}

.tab{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:#eef;font-size:14px;cursor:pointer}
.tab-btn.active{background:#297ff0;color:#fff}

.page{display:none;background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
.page.show{display:block}

/* 今明两天 */
.day-box{margin-bottom:18px}
.day-title{font-size:15px;font-weight:bold;margin-bottom:10px;color:#333}
.people-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
@media(min-width:600px){.people-grid{grid-template-columns:1fr 1fr}}
.person{padding:10px;border:1px solid #eee;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.person select{padding:6px;border-radius:6px;border:1px solid #ccc;min-width:100px}

.result-box{margin-top:12px;padding:12px;background:#f8f9fa;border-radius:8px;line-height:1.8;font-size:14px}
.bai{color:#0066cc;font-weight:bold}
.zhong{color:#ff6600;font-weight:bold}
.ye{color:#9900cc;font-weight:bold}
.xiu{color:#666;font-weight:bold}
.qing{color:#cc0000;font-weight:bold}

.count-box{margin-top:10px;padding-top:10px;border-top:1px solid #ddd;display:flex;gap:10px;flex-wrap:wrap;font-size:14px}
.count-item{padding:6px 10px;background:#f5f7fa;border-radius:6px}

.btns{margin-top:15px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(min-width:600px){.btns{grid-template-columns:1fr 1fr 1fr 1fr}}
.btn{padding:10px;border:none;border-radius:8px;background:#297ff0;color:#fff;font-size:14px;cursor:pointer}
.btn-red{background:#ff4d4f}
.btn-print{background:#198754}
.btn-excel{background:#fd7e14}

/* 月历 */
.month-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.month-nav button{padding:8px 12px;border:none;border-radius:6px;background:#f1f3f6;cursor:pointer}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-weight:bold;margin-bottom:6px;font-size:12px;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.calendar-day{border:1px solid #eee;border-radius:6px;padding:6px;font-size:12px;min-height:70px;cursor:pointer}
.calendar-day .date{font-weight:bold;margin-bottom:4px;}
.calendar-day.active{background:#e8f3ff;border-color:#297ff0}
.day-shift{font-size:11px;line-height:1.3;}

.day-edit-box{display:none;margin-top:15px}
#dayEditTitle{font-weight:bold;margin-bottom:10px;}

/* 考勤汇总 */
.summary-box{margin-top:20px}
.summary-title{font-weight:bold;margin-bottom:10px;font-size:15px}
.summary-table{width:100%;border-collapse:collapse;background:#fff;font-size:14px}
.summary-table th,.summary-table td{border:1px solid #ddd;padding:8px;text-align:center}
.summary-table th{background:#f0f5ff}

@media print{.tab,.btns{display:none!important}}
</style>
</head>
<body>

<div class="container">
  <div class="title">员工全月排班管理系统</div>

  <div class="tab">
    <button class="tab-btn active" onclick="openTab(0)">今明两天</button>
    <button class="tab-btn" onclick="openTab(1)">全月总表</button>
    <button class="tab-btn" onclick="openTab(2)">考勤汇总</button>
  </div>

  <!-- 今明两天 -->
  <div class="page show" id="page1">
    <div class="day-box">
      <div class="day-title">📅 今天：2026年03月03日 星期二</div>
      <div class="people-grid" id="todayList"></div>
      <div class="result-box" id="todayResult"></div>
      <div class="count-box" id="todayCount"></div>
    </div>
    <div class="day-box">
      <div class="day-title">📅 明天：2026年03月04日 星期三</div>
      <div class="people-grid" id="tomorrowList"></div>
      <div class="result-box" id="tomorrowResult"></div>
      <div class="count-box" id="tomorrowCount"></div>
    </div>
    <div class="btns">
      <button class="btn" onclick="saveTodayTomorrow()">💾 保存</button>
      <button class="btn btn-red" onclick="resetTodayTomorrow()">🔄 重置</button>
      <button class="btn btn-print" onclick="window.print()">🖨️ 打印</button>
      <button class="btn btn-excel" onclick="exportExcel()">📊 导出Excel</button>
    </div>
  </div>

  <!-- 全月总表 -->
  <div class="page" id="page2">
    <div class="month-nav">
      <button id="prevMonth">← 上个月</button>
      <div id="monthText">2026年3月</div>
      <button id="nextMonth">下个月 →</button>
    </div>
    <div class="week-row">
      <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="day-edit-box" id="dayEditBox">
      <div id="dayEditTitle"></div>
      <div class="people-grid" id="dayEditList"></div>
      <div class="result-box" id="dayEditResult"></div>
      <button class="btn" style="margin-top:10px" onclick="saveCurrentDay()">✅ 保存当日排班</button>
    </div>
  </div>

  <!-- 考勤汇总 -->
  <div class="page" id="page3">
    <div class="summary-box">
      <div class="summary-title">📊 全月考勤汇总表</div>
      <div style="overflow-x:auto">
        <table class="summary-table" id="summaryTable">
          <thead>
            <tr>
              <th>姓名</th>
              <th>白班</th>
              <th>中班</th>
              <th>夜班</th>
              <th>调休</th>
              <th>轮休</th>
              <th>请假</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const users = ["孙国华","张延飞","任九森","周雪燕","王文莹","刘志慧","刘正海","康峻铭","刘雪雪","张伟","冯浩"];
const shifts = ["白班","中班","夜班","调休","轮休","请假"];

const store = JSON.parse(localStorage.getItem("fullShiftData")) || {
  days: {}, today: {}, tomorrow: {}
};

let currentView = { year:2026, month:2, day:null };

// 今明两天
function renderTodayTomorrow(){
  renderDay("todayList", "today", "todayResult", "todayCount");
  renderDay("tomorrowList", "tomorrow", "tomorrowResult", "tomorrowCount");
}
function renderDay(listId, key, resId, cntId){
  const el = document.getElementById(listId); el.innerHTML = "";
  users.forEach(u=>{
    const div = document.createElement("div");
    div.className = "person";
    div.innerHTML = `<span>${u}</span><select data-key="${key}" data-name="${u}" onchange="refreshDay('${key}','${resId}','${cntId}')">
      ${shifts.map(s=>`<option ${store[key][u]==s?'selected':''}>${s}</option>`).join("")}
    </select>`;
    el.appendChild(div);
  });
  refreshDay(key, resId, cntId);
}
function refreshDay(key, resId, cntId){
  const r={白班:[],中班:[],夜班:[],调休:[],轮休:[],请假:[]};
  document.querySelectorAll(`select[data-key="${key}"]`).forEach(s=>{
    r[s.value].push(s.dataset.name);
  });
  document.getElementById(resId).innerHTML = `
    <div class="bai">白班：${r.白班.join("、")||"无"}</div>
    <div class="zhong">中班：${r.中班.join("、")||"无"}</div>
    <div class="ye">夜班：${r.夜班.join("、")||"无"}</div>
    <div class="xiu">调休：${r.调休.join("、")||"无"}</div>
    <div class="xiu">轮休：${r.轮休.join("、")||"无"}</div>
    <div class="qing">请假：${r.请假.join("、")||"无"}</div>
  `;
  const work = r.白班.length+r.中班.length+r.夜班.length;
  const rest = 11-work;
  document.getElementById(cntId).innerHTML = `
    <div class="count-item">总人数：11</div>
    <div class="count-item">上班：${work}</div>
    <div class="count-item">休息：${rest}</div>
  `;
}
function saveTodayTomorrow(){
  ["today","tomorrow"].forEach(k=>{
    users.forEach(u=>{
      store[k][u] = document.querySelector(`select[data-key="${k}"][data-name="${u}"]`).value;
    });
  });
  localStorage.setItem("fullShiftData",JSON.stringify(store));
  alert("保存成功！");
}
function resetTodayTomorrow(){
  if(!confirm("重置今明两天？"))return;
  document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);
  saveTodayTomorrow();
}

// 月历
function renderMonth(){
  const y = currentView.year;
  const m = currentView.month;
  document.getElementById("monthText").innerText = `${y}年${m+1}月`;
  const first = (new Date(y,m,1).getDay()||7)-1;
  const max = new Date(y,m+1,0).getDate();
  const g = document.getElementById("calendarGrid"); g.innerHTML = "";
  for(let i=0;i<first;i++) g.appendChild(document.createElement("div"));
  for(let d=1;d<=max;d++){
    const key = `${y}-${m+1}-${d}`;
    const div = document.createElement("div");
    div.className = "calendar-day";
    div.innerHTML = `<div class="date">${d}</div>`;
    div.onclick = ()=>openDay(y,m+1,d);
    g.appendChild(div);
  }
}
function openDay(y,m,d){
  currentView.day = d;
  document.getElementById("dayEditBox").style.display = "block";
  document.getElementById("dayEditTitle").innerText = `${y}年${m}月${d}日 排班`;
  const key = `${y}-${m}-${d}`;
  const el = document.getElementById("dayEditList"); el.innerHTML = "";
  users.forEach(u=>{
    const div = document.createElement("div");
    div.className = "person";
    div.innerHTML = `<span>${u}</span><select data-daykey="${key}" data-name="${u}" onchange="refreshCurrentDay()">
      ${shifts.map(s=>`<option ${store.days[key]?.[u]==s?'selected':''}>${s}</option>`).join("")}
    </select>`;
    el.appendChild(div);
  });
  refreshCurrentDay();
}
function refreshCurrentDay(){
  const key = `${currentView.year}-${currentView.month+1}-${currentView.day}`;
  const r={白班:[],中班:[],夜班:[],调休:[],轮休:[],请假:[]};
  document.querySelectorAll(`select[data-daykey="${key}"]`).forEach(s=>{
    r[s.value].push(s.dataset.name);
  });
  document.getElementById("dayEditResult").innerHTML = `
    <div class="bai">白班：${r.白班.join("、")||"无"}</div>
    <div class="zhong">中班：${r.中班.join("、")||"无"}</div>
    <div class="ye">夜班：${r.夜班.join("、")||"无"}</div>
    <div class="xiu">调休：${r.调休.join("、")||"无"}</div>
    <div class="xiu">轮休：${r.轮休.join("、")||"无"}</div>
    <div class="qing">请假：${r.请假.join("、")||"无"}</div>
  `;
}
function saveCurrentDay(){
  const key = `${currentView.year}-${currentView.month+1}-${currentView.day}`;
  if(!store.days[key]) store.days[key]={};
  document.querySelectorAll(`select[data-daykey="${key}"]`).forEach(s=>{
    store.days[key][s.dataset.name] = s.value;
  });
  localStorage.setItem("fullShiftData",JSON.stringify(store));
  alert("保存成功！");
  renderMonth();
}

// 考勤汇总
function renderSummary(){
  const y = currentView.year;
  const m = currentView.month+1;
  const res = {};
  users.forEach(u=>{
    res[u]={白班:0,中班:0,夜班:0,调休:0,轮休:0,请假:0};
  });
  for(const key in store.days){
    if(!key.startsWith(`${y}-${m}-`)) continue;
    const dayData = store.days[key];
    users.forEach(u=>{
      const t = dayData[u];
      if(t && res[u][t]!==undefined) res[u][t]++;
    });
  }
  const b = document.getElementById("summaryBody");
  b.innerHTML = "";
  users.forEach(u=>{
    const tr=document.createElement("tr");
    tr.innerHTML = `
      <td>${u}</td>
      <td>${res[u].白班}</td>
      <td>${res[u].中班}</td>
      <td>${res[u].夜班}</td>
      <td>${res[u].调休}</td>
      <td>${res[u].轮休}</td>
      <td>${res[u].请假}</td>
    `;
    b.appendChild(tr);
  });
}

// 导出
function exportExcel(){
  const csv = [["姓名","白班","中班","夜班","调休","轮休","请假"]];
  users.forEach(u=>{
    csv.push([u,0,0,0,0,0,0]);
  });
  const blob = new Blob(["\ufeff"+csv.map(e=>e.join(",")).join("\n")],{type:"text/csv"});
  const a = document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download="考勤汇总表.csv";a.click();
}

// 切换
function openTab(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("page"+(n+1)).classList.add("show");
  document.querySelectorAll(".tab-btn")[n].classList.add("active");
  if(n===1) renderMonth();
  if(n===2) renderSummary();
}

document.getElementById("prevMonth").onclick=()=>{currentView.month--;renderMonth();}
document.getElementById("nextMonth").onclick=()=>{currentView.month++;renderMonth();}

renderTodayTomorrow();
</script>
</body>
</html>
